services:
  db:
    image: postgres:16-alpine
    container_name: cocobeach-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: cocobeach
      POSTGRES_PASSWORD: cocobeach_dev
      POSTGRES_DB: cocobeach
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cocobeach"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    container_name: cocobeach-storage
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9100:9000"
      - "9101:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin;
      mc mb --ignore-existing local/cocobeach;
      mc anonymous set download local/cocobeach;
      exit 0;
      "

  backend:
    build: ./backend
    container_name: cocobeach-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://cocobeach:cocobeach_dev@db:5432/cocobeach
      S3_ENDPOINT: http://minio:9000
      S3_BUCKET: cocobeach
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      S3_PUBLIC_URL: http://localhost:9100
      JWT_SECRET: change-me-in-production
      CORS_ORIGIN: http://localhost:5173,http://localhost:5174
      PORT: "3000"
    ports:
      - "3000:3000"
    command: >
      sh -c "npx prisma migrate deploy && node src/index.js"

  client:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cocobeach-client
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

  admin:
    build:
      context: ./admin
      dockerfile: Dockerfile
    container_name: cocobeach-admin
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5174:80"

volumes:
  pgdata:
  miniodata:
