databases:
  - name: cocobeach-db
    plan: free
    databaseName: cocobeach
    user: cocobeach

services:
  # ─── Backend API ────────────────────────────────────────
  - type: web
    name: cocobeach-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cocobeach-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: S3_ENDPOINT
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_BUCKET
        value: cocobeach
      - key: S3_PUBLIC_URL
        sync: false
      - key: NODE_ENV
        value: production

  # ─── Client (public website) ────────────────────────────
  - type: web
    name: cocobeach-client
    runtime: static
    plan: free
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: VITE_BUSINESS_NAME
        value: Ilot Coco Beach
      - key: VITE_BUSINESS_PHONE
        value: "+216 99 123 456"
      - key: VITE_BUSINESS_WHATSAPP
        value: "21699123456"
      - key: VITE_BUSINESS_EMAIL
        value: contact@ilotcocobeach.com
      - key: VITE_BUSINESS_ADDRESS
        value: "Ghar El Melh, Bizerte, Tunisie"
      - key: VITE_BUSINESS_LATITUDE
        value: "37.1476125"
      - key: VITE_BUSINESS_LONGITUDE
        value: "10.2133906"
      - key: VITE_INSTAGRAM_URL
        value: https://www.instagram.com/ilotcocobeach
      - key: VITE_FACEBOOK_URL
        value: https://www.facebook.com/IlotCocoBeach

  # ─── Admin panel ────────────────────────────────────────
  - type: web
    name: cocobeach-admin
    runtime: static
    plan: free
    rootDir: admin
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
