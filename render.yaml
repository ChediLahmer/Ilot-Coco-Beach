databases:
  - name: cocobeach-db
    plan: free
    databaseName: cocobeach
    user: cocobeach

services:
  # ─── Backend API ────────────────────────────────────────
  - type: web
    name: cocobeach-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: rm -f package-lock.json && npm install --include=dev && ./node_modules/.bin/prisma generate && ./node_modules/.bin/prisma migrate deploy && node prisma/seed.js
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cocobeach-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        sync: false
      - key: S3_ENDPOINT
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: S3_BUCKET
        value: cocobeach
      - key: S3_PUBLIC_URL
        sync: false
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: "20.19.0"

  # ─── Client (public website) ────────────────────────────
  - type: web
    name: cocobeach-client
    runtime: static
    rootDir: client
    buildCommand: rm -f package-lock.json && npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: NODE_VERSION
        value: "20.19.0"

  # ─── Admin panel ────────────────────────────────────────
  - type: web
    name: cocobeach-admin
    runtime: static
    rootDir: admin
    buildCommand: rm -f package-lock.json && npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
      - key: NODE_VERSION
        value: "20.19.0"
